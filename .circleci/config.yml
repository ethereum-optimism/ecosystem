version: 2.1

orbs:
  nx: nrwl/nx@1.7.0
  utils: ethereum-optimism/circleci-utils@1.0.27

commands:
  prepare-snapshot:
    description: "Prepare the snapshot name"
    steps:
      - run:
          name: Setup snapshot name
          command: |
            SNAPSHOT_NAME=${CIRCLE_BRANCH}
            echo "Will create snapshot using name $SNAPSHOT_NAME"
            echo "export SNAPSHOT_NAME=${SNAPSHOT_NAME}" >> "$BASH_ENV"
      - run:
          name: Prepare changeset version environment
          command: |
            echo "export GITHUB_TOKEN=${GITHUB_TOKEN_GOVERNANCE}" >> "$BASH_ENV"
      - run:
          name: Create snapshot versions
          command: pnpm release:version:snapshot

  setup:
    description: "Setup Node.js environment with pnpm and nx"
    steps:
      - utils/checkout-with-mise # Install dependencies
      - run:
          name: Install dependencies
          environment:
            NPM_TOKEN: nada
          command: |
            pnpm i --frozen-lockfile
      - nx/set-shas
      - run:
          name: clean unstaged changes in case of previous failed runs
          command: |
            git clean -fd
      - run:
          name: Log nx base and head refs
          command: |
            echo "BASE: $NX_BASE"
            echo "HEAD: $NX_HEAD"
            echo "Changed files between BASE and HEAD:"
            git diff --name-only $NX_BASE $NX_HEAD
            echo "Available nx projects and their targets:"
            pnpm nx show projects --with-target test

jobs:
  publish-to-npm:
    docker:
      - image: cimg/node:22.14
    parameters:
      prepare-snapshot:
        type: boolean
        default: false
    steps:
      - setup
      - run:
          name: Install npm with OIDC trusted publishing support
          command: npm install -g npm@11.12.1
      - run:
          name: Build projects
          environment:
            NPM_TOKEN: nada
          command: pnpm nx run-many --target=build
      - run:
          name: Obtain OIDC token for npm trusted publishing
          command: |
            set -e
            NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud":"npm:registry.npmjs.org"}')
            if [ -z "$NPM_ID_TOKEN" ]; then
              echo "ERROR: circleci run oidc get returned an empty token" >&2
              exit 1
            fi
            echo "OIDC token fetched (length=${#NPM_ID_TOKEN})"
            echo "export NPM_ID_TOKEN=$NPM_ID_TOKEN" >> "$BASH_ENV"

      - when:
          condition:
            equal: [<< parameters.prepare-snapshot >>, true]
          steps:
            - prepare-snapshot

      - utils/changesets:
          createGithubReleases: false
          publish: "pnpm release:publish"
          version: "pnpm release:version"

  check:
    docker:
      - image: cimg/node:22.14
    steps:
      - setup
      - run:
          name: Run Build
          command: pnpm nx affected --base=$NX_BASE --head=$NX_HEAD --target=build
      - run:
          name: Run TypeChecker
          command: pnpm nx affected --base=$NX_BASE --head=$NX_HEAD --target=typecheck
      - run:
          name: Run Linters
          command: pnpm nx affected --base=$NX_BASE --head=$NX_HEAD --target=lint
      - run:
          name: Run Tests
          command: pnpm nx affected --base=$NX_BASE --head=$NX_HEAD --target=test

  # TEMPORARY DIAGNOSTIC JOB - remove after OIDC trusted publishing is verified.
  # Does not consume changesets, does not publish, does not write to git.
  # Runs `npm publish --dry-run` against each trust-configured package so the
  # registry's OIDC token-exchange endpoint is exercised and any per-package
  # trust mismatch surfaces as a clear error in the job log.
  verify-oidc:
    docker:
      - image: cimg/node:22.14
    steps:
      - setup
      - run:
          name: Install npm with OIDC trusted publishing support
          command: npm install -g npm@11.12.1
      - run:
          name: Build projects
          environment:
            NPM_TOKEN: nada
          command: pnpm nx run-many --target=build
      - run:
          name: Obtain OIDC token for npm trusted publishing
          command: |
            set -e
            NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud":"npm:registry.npmjs.org"}')
            if [ -z "$NPM_ID_TOKEN" ]; then
              echo "ERROR: circleci run oidc get returned an empty token" >&2
              exit 1
            fi
            echo "OIDC token fetched (length=${#NPM_ID_TOKEN})"
            echo "export NPM_ID_TOKEN=$NPM_ID_TOKEN" >> "$BASH_ENV"
      - run:
          name: Dry-run publish to exercise OIDC token exchange per package
          command: |
            set +e
            overall=0
            for pkg_dir in \
              packages/viem \
              packages/wagmi \
              apps/autorelayer-interop \
              apps/ponder-interop; do
              echo ""
              echo "====== $pkg_dir ======"
              ( cd "$pkg_dir" && npm publish --dry-run --loglevel=silly 2>&1 | tail -120 )
              rc=$?
              echo "exit_code=$rc for $pkg_dir"
              if [ "$rc" -ne 0 ]; then overall=1; fi
            done
            echo ""
            echo "====== SUMMARY ======"
            echo "overall_exit=$overall"
            exit $overall

workflows:
  release:
    jobs:
      - publish-to-npm:
          name: Publish new versions
          context:
            - circleci-repo-ecosystem # for GITHUB_TOKEN_GOVERNANCE
          filters:
            branches:
              only: main

      - publish-to-npm:
          name: Publish snapshot versions
          prepare-snapshot: true
          context:
            - circleci-repo-ecosystem # for GITHUB_TOKEN_GOVERNANCE
          filters:
            branches:
              only: main
  check-workflow:
    jobs:
      - check:
          context:
            - circleci-repo-readonly-authenticated-github-token # for GITHUB_TOKEN (mise GitHub API auth)

  # TEMPORARY - remove together with the verify-oidc job once OIDC is verified.
  verify-oidc-workflow:
    jobs:
      - verify-oidc:
          name: Verify OIDC trusted publishing (dry-run)
          filters:
            branches:
              ignore: main
